<!DOCTYPE html>
<html>
<head>
  <title>FTL Dashboard Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #0f0f1a; color: white; }
    nav { display: flex; gap: 8px; padding: 12px 16px; background: #1a1a2e; border-bottom: 1px solid #333; }
    nav button { padding: 8px 18px; border: none; border-radius: 6px; 
                 cursor: pointer; background: #2a2a3e; color: #aaa; font-size: 14px; }
    nav button.active { background: #4f6ef7; color: white; }
    nav button:hover { background: #3a3a5e; }
    .title { padding: 0 16px; line-height: 44px; font-weight: 600; font-size: 16px; margin-right: 8px; }
    iframe { width: 100%; height: calc(100vh - 52px); border: none; display: none; }
    iframe.active { display: block; }
  </style>
</head>
<body>
  <nav>
    <span class="title">FTL Portal</span>
    <button onclick="show('ftlgym', this)" class="active">FTL Gym Dashboard</button>
    <button onclick="show('metaads', this)">Meta Ads</button>
    <button onclick="show('googleads', this)">Google Ads</button>
  </nav>

  <iframe id="ftlgym"    class="active" src="https://ftl-google-reviewbackfire--project.up.railway.app/"></iframe>
  <iframe id="metaads"   src="https://meta-ads-dashboard-production-ad50.up.railway.app"></iframe>
  <iframe id="googleads" src="GANTI_URL_GOOGLE_ADS"></iframe>

  <script>
    function show(id, btn) {
      document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
    }
  </script>
</body>
</html>
