<!DOCTYPE html>
<html>
<head>
  <title>FTL Dashboard Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #0f0f1a; color: white; }

    /* Login */
    #login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: #0f0f1a; }
    .login-box { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 16px; padding: 40px; width: 360px; text-align: center; }
    .login-box h2 { font-size: 22px; margin-bottom: 6px; color: #4f6ef7; }
    .login-box p { font-size: 13px; color: #888; margin-bottom: 28px; }
    .login-box input { width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid #2a2a3e; background: #0f0f1a; color: white; font-size: 14px; margin-bottom: 12px; outline: none; }
    .login-box input:focus { border-color: #4f6ef7; }
    .login-box button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #4f6ef7; color: white; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px; }
    .login-box button:hover { background: #3a5ce5; }
    .error { color: #e74c3c; font-size: 13px; margin-top: 10px; display: none; }

    /* Portal */
    #portal { display: none; }
    nav { display: flex; gap: 8px; padding: 12px 16px; background: #1a1a2e; border-bottom: 1px solid #333; align-items: center; }
    nav button { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; background: #2a2a3e; color: #aaa; font-size: 14px; }
    nav button.active { background: #4f6ef7; color: white; }
    .title { padding: 0 16px; line-height: 44px; font-weight: 600; font-size: 16px; margin-right: 8px; }
    .logout { margin-left: auto; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; background: #e74c3c; color: white; font-size: 13px; }
    iframe { width: 100%; height: calc(100vh - 52px); border: none; display: none; }
    iframe.active { display: block; }
  </style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-box">
    <h2>FTL Portal</h2>
    <p>Masukkan kredensial untuk melanjutkan</p>
    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" onkeydown="if(event.key==='Enter') doLogin()" />
    <button onclick="doLogin()">Masuk</button>
    <div class="error" id="error-msg">Username atau password salah</div>
  </div>
</div>

<!-- Portal -->
<div id="portal">
  <nav>
    <span class="title">FTL Portal</span>
    <button onclick="show('ftlgym', this)" class="active">FTL Gym Dashboard</button>
    <button onclick="show('metaads', this)">Meta Ads</button>
    <button onclick="show('googleads', this)">Google Ads</button>
    <button class="logout" onclick="doLogout()">Logout</button>
  </nav>
  <iframe id="ftlgym"    class="active" src="https://ftl-google-reviewbackfire--project.up.railway.app/"></iframe>
  <iframe id="metaads"   src="https://meta-ads-dashboard-production-ad50.up.railway.app/"></iframe>
  <iframe id="googleads" src="https://google-ads-dashboard-production-676e.up.railway.app/"></iframe>
</div>

<script>
  const USERS = {
    'ftladmin': 'ftl2026'
  };

  function doLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    if (USERS[u] && USERS[u] === p) {
      sessionStorage.setItem('ftl_auth', 'true');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('portal').style.display = 'block';
    } else {
      document.getElementById('error-msg').style.display = 'block';
    }
  }

  function doLogout() {
    sessionStorage.removeItem('ftl_auth');
    location.reload();
  }

  function show(id, btn) {
    document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
  }

  if (sessionStorage.getItem('ftl_auth') === 'true') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('portal').style.display = 'block';
  }
</script>
</body>
</html>
